<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BloodLink</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="auth.js"></script>
</head>

<body>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <h1>🩸 BloodLink</h1>
    <p>BLOOD BANK MANAGEMENT SYSTEM</p>

    <ul>
      <li>Blood Stock Management</li>
      <li>Donor Registration</li>
      <li>Hospital Blood Requests</li>
      <li>Donation History</li>
    </ul>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login', this)">Login</button>
      <button class="tab" onclick="switchTab('register', this)">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm" class="auth-form">
      <h2>Welcome back</h2>

      <input type="email" id="loginEmail" placeholder="Email Address">
      <input type="password" id="loginPassword" placeholder="Password">

      <button onclick="login()">Sign In</button>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="auth-form hidden">
      <h2>Create Account</h2>

      <input type="email" id="registerEmail" placeholder="Email Address">
      <input type="password" id="registerPassword" placeholder="Password">

      <button onclick="register()">Register</button>
    </div>

  </div>

</div>

<!-- TAB SCRIPT -->
<script>
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));

  el.classList.add('active');
  document.getElementById(tab + 'Form').classList.remove('hidden');
}
</script>

</body>
</html>
