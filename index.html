<script type="module">
import { auth, db } from './firebase-config.js';

import {
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  doc,
  setDoc,
  getDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


/* ---------------- TAB SWITCH FIX ---------------- */

const loginTab = document.getElementById('tab-login');
const registerTab = document.getElementById('tab-register');

loginTab.addEventListener('click', () => switchTab('login'));
registerTab.addEventListener('click', () => switchTab('register'));

function switchTab(tab) {
  document.getElementById('login-section').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-section').classList.toggle('hidden', tab !== 'register');

  loginTab.classList.toggle('active', tab === 'login');
  registerTab.classList.toggle('active', tab === 'register');
}


/* ---------------- ROLE FIELD TOGGLE ---------------- */

document.getElementById('reg-role').addEventListener('change', toggleFields);

function toggleFields() {
  const role = document.getElementById('reg-role').value;

  document.getElementById('donor-fields').style.display =
    role === 'donor' ? 'block' : 'none';

  document.getElementById('hospital-fields').style.display =
    role === 'hospital' ? 'block' : 'none';
}


/* ---------------- HELPERS ---------------- */

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

function showOk(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}

function setBusy(id, yes) {
  const btn = document.getElementById(id);
  btn.disabled = yes;

  btn.innerHTML = yes
    ? '<span class="spinner"></span> Please wait...'
    : (id === 'login-btn' ? 'Sign In' : 'Create Account');
}


/* ---------------- LOGIN ---------------- */

document.getElementById('login-btn').addEventListener('click', handleLogin);

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;

  if (!email || !pass) {
    return showErr('login-error', '⚠ Enter email & password');
  }

  setBusy('login-btn', true);

  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    const snap = await getDoc(doc(db, 'users', cred.user.uid));

    if (!snap.exists()) throw new Error("User not found");

    const d = snap.data();

    sessionStorage.setItem('bl_uid', cred.user.uid);
    sessionStorage.setItem('bl_role', d.role);
    sessionStorage.setItem('bl_name', d.name);

    window.location.href = `dashboard-${d.role}.html`;

  } catch (e) {
    setBusy('login-btn', false);
    showErr('login-error', '❌ ' + e.message);
  }
}


/* ---------------- GOOGLE LOGIN ---------------- */

document.getElementById('google-btn').addEventListener('click', handleGoogleLogin);

async function handleGoogleLogin() {
  try {
    const result = await signInWithPopup(auth, new GoogleAuthProvider());
    const user = result.user;

    const snap = await getDoc(doc(db, 'users', user.uid));

    if (!snap.exists()) {
      const data = {
        uid: user.uid,
        name: user.displayName,
        email: user.email,
        role: 'donor',
        createdAt: serverTimestamp()
      };

      await setDoc(doc(db, 'users', user.uid), data);
    }

    window.location.href = "dashboard-donor.html";

  } catch (e) {
    showErr('login-error', '❌ Google login failed');
  }
}


/* ---------------- REGISTER ---------------- */

document.getElementById('reg-btn').addEventListener('click', handleRegister);

async function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const role = document.getElementById('reg-role').value;
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;

  if (!name || !role || !email || !pass) {
    return showErr('reg-error', '⚠ Fill all fields');
  }

  if (pass !== pass2) {
    return showErr('reg-error', '⚠ Password mismatch');
  }

  setBusy('reg-btn', true);

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);

    const data = {
      uid: cred.user.uid,
      name,
      email,
      role,
      createdAt: serverTimestamp()
    };

    await setDoc(doc(db, 'users', cred.user.uid), data);

    showOk('reg-success', '✅ Account Created');

    setTimeout(() => {
      window.location.href = `dashboard-${role}.html`;
    }, 1200);

  } catch (e) {
    setBusy('reg-btn', false);
    showErr('reg-error', '❌ ' + e.message);
  }
}
</script>
