<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BloodLink</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="auth.js"></script>
</head>

<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <h1>🩸 BloodLink</h1>
    <p>Blood Bank Management System</p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">

    <!-- Tabs -->
    <div class="tabs">
      <button class="ptab active" onclick="switchTab('login', this)">Login</button>
      <button class="ptab" onclick="switchTab('register', this)">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="login-section" class="form-section">
      <h2>Welcome Back</h2>

      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">

      <button onclick="login()">Sign In</button>
    </div>

    <!-- REGISTER -->
    <div id="register-section" class="form-section hidden">
      <h2>Create Account</h2>

      <input type="email" id="registerEmail" placeholder="Email">
      <input type="password" id="registerPassword" placeholder="Password">

      <button onclick="register()">Register</button>
    </div>

  </div>
</div>

<!-- JS -->
<script>
function switchTab(tab, el) {
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(s => s.classList.add('hidden'));

  el.classList.add('active');
  document.getElementById(tab + '-section').classList.remove('hidden');
}
</script>

</body>
</html>
